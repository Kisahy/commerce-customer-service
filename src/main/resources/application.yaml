spring:
  application:
    name: commerce-customer-service

  datasource:
    url: jdbc:mariadb://localhost:33060/commerce_customer
    username: ${DB_USERNAME:commerce_customer}
    password: ${DB_PASSWORD:commerce_customer}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

server:
  port: 8082
