spring:
  application:
    name: commerce-customer-service

  datasource:
    url: jdbc:mariadb://localhost:33060/commerce_customer
    username: ${DB_USERNAME:commerce_customer}
    password: ${DB_PASSWORD:commerce_customer}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

jwt:
  secret: HiZmCkWZsxxUuhMzYMXEkivAwDHgch9Y
  expiration: 86400000
